<div class="blank-layout-container justify-content-center align-items-center bg-light">
  <div class="position-relative row w-100 h-100 bg-gredient justify-content-center">
    <div class="col-lg-4 d-flex align-items-center">
      <mat-card class="cardWithShadow boxed-auth">
        <mat-card-content class="p-32">

          <!-- BRANDING SECTION -->
          <div class="branding-section">
            <div class="logo-container">
              <img 
                src="./assets/images/logos/logo-testforge-ai.png" 
                alt="TestForge AI" 
                class="login-logo" />
            </div>
            
            <div class="brand-title-wrapper">
              <span class="brand-name">TestForge</span>
              <span class="brand-ai">AI</span>
            </div>
            
            <p class="brand-subtitle">AUTOMATION TEST INTELLIGENT</p>
          </div>

          <div class="or-border">Sign in with your credentials</div>

          <!-- Erreur globale -->
          <div *ngIf="errorMessage" class="global-error">
            <mat-icon>error_outline</mat-icon>
            <span>{{ errorMessage }}</span>
          </div>

          <form [formGroup]="form" (ngSubmit)="submit()" class="login-form">

            <!-- Champ Email -->
              <div class="form-field-wrapper">
                <label class="form-label">Email</label>
                <mat-form-field appearance="outline" class="custom-form-field" color="primary">
                  <input matInput formControlName="email" type="email" placeholder="you@example.com" />
                </mat-form-field>
                <div class="field-error" *ngIf="f['email'].touched && f['email'].invalid">
                  <span *ngIf="f['email'].hasError('required')">Email is required</span>
                  <span *ngIf="f['email'].hasError('email')">Enter a valid email</span>
                </div>
              </div>

            <!-- Champ Password -->
            <div class="form-field-wrapper">
              <label class="form-label">Password</label>
              <mat-form-field appearance="outline" class="custom-form-field" color="primary">
                <input
                  matInput
                  [type]="hidePassword ? 'password' : 'text'"
                  formControlName="password"
                  placeholder="••••••••"
                />
                <button
                  mat-icon-button
                  matSuffix
                  type="button"
                  (click)="hidePassword = !hidePassword"
                  [attr.aria-label]="'Toggle password visibility'"
                >
                  <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
                </button>
              </mat-form-field>
              <div class="field-error" *ngIf="f['password'].touched && f['password'].invalid">
                <span *ngIf="f['password'].hasError('required')">Password is required</span>
              </div>
            </div>

            <!-- Forgot Password -->
            <div class="text-end forgot-link">
              <a routerLink="/authentication/forgot-password">Forgot password?</a>
            </div>

            <!-- Submit Button - Centré -->
            <div class="button-wrapper">
              <button
                mat-flat-button
                color="primary"
                class="submit-btn"
                type="submit"
                [disabled]="form.invalid || loading"
              >
                {{ loading ? 'Signing in...' : 'Sign In' }}
              </button>
            </div>

          </form>

        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
