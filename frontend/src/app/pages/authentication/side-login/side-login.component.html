<div class="blank-layout-container justify-content-center align-items-center bg-light">
  <div class="position-relative row w-100 h-100 bg-gredient justify-content-center">
    <div class="col-lg-4 d-flex align-items-center">
      <mat-card class="cardWithShadow boxed-auth">
        <mat-card-content class="p-32">

          <div class="text-center" style="margin-top: auto; margin-bottom: 16px;">
            <img src="./assets/images/logos/logo.png" style="
              max-width: 300px;
              min-width: 120px;
              height: auto;
              object-fit: contain;
              display: block;
              margin: 0 auto;
            "/>
          </div>

          <div class="or-border m-t-16">Sign in with your credentials</div>

          <mat-error *ngIf="errorMessage" class="d-block text-center m-t-16">
            {{ errorMessage }}
          </mat-error>

          <form [formGroup]="form" (ngSubmit)="submit()" class="m-t-30"
                style="max-width: 320px; margin-left: auto; margin-right: auto;">

            <mat-label class="f-s-14 f-w-600 m-b-12 d-block">Email</mat-label>
            <mat-form-field appearance="outline" class="w-100" color="primary">
              <input matInput formControlName="email" type="email" placeholder="you@example.com" />
              <mat-error *ngIf="f['email'].hasError('required')">Email is required</mat-error>
              <mat-error *ngIf="f['email'].hasError('email')">Enter a valid email</mat-error>
            </mat-form-field>

            <mat-label class="f-s-14 f-w-600 m-b-12 d-block">Password</mat-label>
            <mat-form-field appearance="outline" class="w-100" color="primary">
              <input matInput type="password" formControlName="password" placeholder="••••••••" />
              <mat-error *ngIf="f['password'].hasError('required')">Password is required</mat-error>
            </mat-form-field>

            <!-- ← ADD THIS -->
            <div class="text-end m-b-16">
              <a routerLink="/authentication/forgot-password"
                 class="f-s-13"
                 style="color: #5d87ff; text-decoration: none;">
                Forgot password?
              </a>
            </div>

            <button
              mat-flat-button
              color="primary"
              class="w-100 m-t-8"
              type="submit"
              [disabled]="form.invalid || loading"
            >
              {{ loading ? 'Signing in...' : 'Sign In' }}
            </button>

          </form>

        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
