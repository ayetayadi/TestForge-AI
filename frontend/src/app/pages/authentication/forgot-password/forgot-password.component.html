<div class="blank-layout-container justify-content-center align-items-center bg-light">
  <div class="position-relative row w-100 h-100 bg-gredient justify-content-center">
    <div class="col-lg-4 d-flex align-items-center">
      <mat-card class="cardWithShadow boxed-auth">
        <mat-card-content class="p-32">

          <div class="text-center" style="margin-bottom:16px">
            <img src="/assets/images/logos/logo.png"
                 style="max-width:200px; height:auto; display:block; margin:0 auto;" />
          </div>

          <!-- ── Confirmation screen (after submit) ── -->
          <div *ngIf="sent" class="text-center">
            <div style="font-size:48px; margin-bottom:12px">✉️</div>
            <h2 class="f-s-20 f-w-700 m-0">Check your inbox</h2>
            <p class="f-s-14 m-t-8" style="color:#666; line-height:1.6">
              If that email is registered, you'll receive a reset link shortly.
              The link expires in <strong>30 minutes</strong>.
            </p>
            <a mat-stroked-button routerLink="/authentication/login"
               class="w-100 m-t-24" style="max-width:320px; display:block; margin:24px auto 0">
              Back to login
            </a>
          </div>

          <!-- ── Form screen ── -->
          <div *ngIf="!sent">

            <div class="text-center m-b-24">
              <h2 class="f-s-20 f-w-700 m-0">Forgot password?</h2>
              <p class="f-s-14 m-t-8" style="color:#666">
                Enter your email and we'll send you a reset link.
              </p>
            </div>

            <mat-error *ngIf="errorMessage" class="d-block text-center m-b-16">
              {{ errorMessage }}
            </mat-error>

            <form [formGroup]="form" (ngSubmit)="submit()"
                  style="max-width:320px; margin:0 auto">

              <mat-label class="f-s-14 f-w-600 m-b-12 d-block">Email address</mat-label>
              <mat-form-field appearance="outline" class="w-100" color="primary">
                <input matInput type="email" formControlName="email"
                       placeholder="you@example.com" />
                <mat-error *ngIf="f['email'].hasError('required')">Required</mat-error>
                <mat-error *ngIf="f['email'].hasError('email')">Invalid email</mat-error>
              </mat-form-field>

              <button mat-flat-button color="primary" type="submit"
                      class="w-100 m-t-8" [disabled]="form.invalid || loading">
                {{ loading ? 'Sending…' : 'Send reset link' }}
              </button>

              <div class="text-center m-t-16">
                <a routerLink="/authentication/login"
                   class="f-s-13" style="color:#5d87ff; text-decoration:none">
                  Back to login
                </a>
              </div>

            </form>
          </div>

        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
