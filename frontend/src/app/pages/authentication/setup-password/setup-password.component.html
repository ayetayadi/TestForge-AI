<div class="blank-layout-container justify-content-center align-items-center bg-light">
  <div class="position-relative row w-100 h-100 bg-gredient justify-content-center">
    <div class="col-lg-4 d-flex align-items-center">
      <mat-card class="cardWithShadow boxed-auth">
        <mat-card-content class="p-32">

          <!-- LOGO -->
          <div class="text-center" style="margin-bottom:24px">
            <img src="./assets/images/logos/testforge-logo.png"
                 style="max-width:200px; height:auto; display:block; margin:0 auto;" />
          </div>

          <!-- INVALID TOKEN -->
          <div *ngIf="invalidToken" class="text-center">
            <mat-icon style="font-size:48px; color:#f44336">link_off</mat-icon>
            <h3 class="f-s-18 f-w-600 m-t-16">Invalid Setup Link</h3>
            <p style="color:#666">This link is invalid or has already been used.</p>

            <a [routerLink]="['/authentication/login']"
               mat-flat-button color="primary">
              Go to Login
            </a>
          </div>

          <!-- FORM -->
          <div *ngIf="!invalidToken">

            <div class="text-center m-b-24">
              <h2 class="f-s-20 f-w-700 m-0">Set Your Password</h2>
              <p class="f-s-14 m-t-8" style="color:#666">
                Choose a strong password to activate your account.
              </p>
            </div>

            <!-- SUCCESS -->
            <div *ngIf="successMessage" class="m-b-16 text-center" style="color:green">
              ✓ {{ successMessage }}
            </div>

            <!-- ERROR -->
            <mat-error *ngIf="errorMessage" class="d-block text-center m-b-16">
              {{ errorMessage }}
            </mat-error>

            <form [formGroup]="form"
                  (ngSubmit)="submit()"
                  style="max-width:320px; margin:0 auto">

              <!-- PASSWORD -->
              <mat-label class="f-s-14 f-w-600 m-b-12 d-block">
                New Password
              </mat-label>

              <mat-form-field appearance="outline" class="w-100" color="primary">
                <input
                  matInput
                  [type]="hidePassword ? 'password' : 'text'"
                  formControlName="password"
                  placeholder="Min 6 characters"
                />

                <button
                  mat-icon-button
                  matSuffix
                  type="button"
                  (click)="hidePassword = !hidePassword"
                  (mousedown)="$event.preventDefault()"
                >
                  <mat-icon>
                    {{ hidePassword ? 'visibility_off' : 'visibility' }}
                  </mat-icon>
                </button>

                <mat-error *ngIf="f['password'].hasError('required')">
                  Required
                </mat-error>
                <mat-error *ngIf="f['password'].hasError('minlength')">
                  Min 6 characters
                </mat-error>
              </mat-form-field>

              <!-- CONFIRM PASSWORD -->
              <mat-label class="f-s-14 f-w-600 m-b-12 d-block">
                Confirm Password
              </mat-label>

              <mat-form-field appearance="outline" class="w-100" color="primary">
                <input
                  matInput
                  [type]="hideConfirmPassword ? 'password' : 'text'"
                  formControlName="confirm_password"
                  placeholder="Repeat your password"
                />

                <button
                  mat-icon-button
                  matSuffix
                  type="button"
                  (click)="hideConfirmPassword = !hideConfirmPassword"
                  (mousedown)="$event.preventDefault()"
                >
                  <mat-icon>
                    {{ hideConfirmPassword ? 'visibility_off' : 'visibility' }}
                  </mat-icon>
                </button>

                <mat-error *ngIf="f['confirm_password'].hasError('required')">
                  Required
                </mat-error>

                <mat-error *ngIf="f['confirm_password'].hasError('mismatch')">
                  Passwords do not match
                </mat-error>
              </mat-form-field>

              <!-- BUTTON -->
              <button
                mat-flat-button
                color="primary"
                type="submit"
                class="w-100 m-t-8"
                [disabled]="form.invalid || loading"
              >
                {{ loading ? 'Activating...' : 'Activate Account' }}
              </button>

            </form>
          </div>

        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
