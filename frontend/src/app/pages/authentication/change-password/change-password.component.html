<div class="blank-layout-container justify-content-center align-items-center bg-light">
  <div class="position-relative row w-100 h-100 bg-gredient justify-content-center">
    <div class="col-lg-4 d-flex align-items-center">
      <mat-card class="cardWithShadow boxed-auth">
        <mat-card-content class="p-32">

          <div class="text-center" style="margin-bottom:16px">
            <img src="./assets/images/logos/testforge-logo.png"
                 style="max-width:200px; height:auto; display:block; margin:0 auto;" />
          </div>

          <div class="text-center m-b-24">
            <h2 class="f-s-20 f-w-700 m-0">Set New Password</h2>
            <p class="f-s-14 m-t-8" style="color:#666">
              This is your first login. Please set a new password to continue.
            </p>
          </div>

          <div *ngIf="successMessage" class="m-b-16" style="color:green; text-align:center">
            ✓ {{ successMessage }}
          </div>
          <mat-error *ngIf="errorMessage" class="d-block text-center m-b-16">
            {{ errorMessage }}
          </mat-error>

          <form [formGroup]="form" (ngSubmit)="submit()"
                style="max-width:320px; margin:0 auto">

            <mat-label class="f-s-14 f-w-600 m-b-12 d-block">Current Password</mat-label>
            <mat-form-field appearance="outline" class="w-100" color="primary">
              <input matInput type="password" formControlName="current_password"
                     placeholder="Your temporary password" />
              <mat-error *ngIf="f['current_password'].hasError('required')">
                Required
              </mat-error>
            </mat-form-field>

            <mat-label class="f-s-14 f-w-600 m-b-12 d-block">New Password</mat-label>
            <mat-form-field appearance="outline" class="w-100" color="primary">
              <input matInput type="password" formControlName="new_password"
                     placeholder="Min 6 characters" />
              <mat-error *ngIf="f['new_password'].hasError('required')">Required</mat-error>
              <mat-error *ngIf="f['new_password'].hasError('minlength')">
                Min 6 characters
              </mat-error>
            </mat-form-field>

            <mat-label class="f-s-14 f-w-600 m-b-12 d-block">Confirm New Password</mat-label>
            <mat-form-field appearance="outline" class="w-100" color="primary">
              <input matInput type="password" formControlName="confirm_password"
                     placeholder="Repeat new password" />
              <mat-error *ngIf="f['confirm_password'].hasError('required')">Required</mat-error>
              <mat-error *ngIf="f['confirm_password'].hasError('mismatch')">
                Passwords do not match
              </mat-error>
            </mat-form-field>

            <button mat-flat-button color="primary" type="submit"
                    class="w-100 m-t-8" [disabled]="form.invalid || loading">
              {{ loading ? 'Saving...' : 'Set New Password' }}
            </button>

          </form>

        </mat-card-content>
      </mat-card>
    </div>
  </div>
</div>
