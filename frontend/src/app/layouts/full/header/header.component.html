<mat-toolbar class="topbar">
  
  <!-- À GAUCHE -->
  <div class="left-content">
    <button 
      mat-icon-button 
      (click)="toggleSidebar.emit()"
      class="toggle-btn">
      <mat-icon>{{ isSidebarCollapsed ? 'menu' : 'chevron_left' }}</mat-icon>
    </button>
    
    <div class="search-bar">
      <mat-icon>search</mat-icon>
      <input type="text" placeholder="Search...">
      <kbd>⌘K</kbd>
    </div>
  </div>

  <!-- À DROITE -->
  <div class="right-content">

    <!-- Notification bell -->
    <app-notification-bell></app-notification-bell>

    <div class="user-menu" [matMenuTriggerFor]="userMenu">
      <div class="user-info">
        <div class="user-details">
          <span class="user-name">{{ username || 'User' }}</span>
          <span class="user-role">{{ role || 'Role' }}</span>
        </div>
        <div class="user-avatar">
          <span class="avatar-initials">{{ getInitials() }}</span>
        </div>
      </div>
    </div>
    
    <mat-menu #userMenu="matMenu" class="user-dropdown">
      <div class="dropdown-header">
        <div class="dropdown-avatar">
          <span>{{ getInitials() }}</span>
        </div>
        <div class="dropdown-info">
          <div class="dropdown-name">{{ username || 'User' }}</div>
          <div class="dropdown-role">{{ role || 'Role' }}</div>
        </div>
      </div>
      
      <mat-divider></mat-divider>
      
      <button mat-menu-item routerLink="/profile">
        <mat-icon>person_outline</mat-icon>
        <span>Profile</span>
      </button>
      
      <mat-divider></mat-divider>
      
      <button mat-menu-item (click)="logout()" class="logout-btn">
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </div>
  
</mat-toolbar>
