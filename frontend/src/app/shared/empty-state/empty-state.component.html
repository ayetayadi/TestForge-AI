    <div class="empty-state">
      <div class="empty-icon">
        <ng-content select="[icon]"></ng-content>
      </div>
      <h3 class="empty-title">{{ title }}</h3>
      @if (description) {
        <p class="empty-description">{{ description }}</p>
      }
      @if (actionText) {
        <button class="empty-action" (click)="action.emit()">
          {{ actionText }}
        </button>
      }
    </div>
