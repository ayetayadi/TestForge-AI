<div class="score-badge" [class]="scoreClass()">

  <span class="score-value">
    {{ scoreNormalized().toFixed(1) }}
  </span>

  @if (delta !== undefined && delta !== 0) {
    <span class="score-delta"
          [class.positive]="delta > 0"
          [class.negative]="delta < 0">

      {{ delta > 0 ? '+' : '' }}
      {{ (delta <= 1 ? delta * 10 : delta).toFixed(1) }}

    </span>
  }

</div>
