<div class="filter-bar">

  <div class="filter-groups">
    @for (group of groups(); track group.key) {
      <div
        class="filter-dropdown"
        [class.open]="openDropdown() === group.key"
        [class.has-active]="(activeFilters()[group.key]?.length ?? 0) > 0"
      >
        <!-- Trigger button -->
        <button class="filter-trigger" (click)="toggleDropdown(group.key)">
          <!-- Filter icon -->
          <svg class="filter-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M2.628 1.601C5.028 1.206 7.49 1 10 1s4.973.206 7.372.601a.75.75 0 01.628.74v2.288a2.25 2.25 0 01-.659 1.59l-4.682 4.683a2.25 2.25 0 00-.659 1.59v3.037c0 .684-.31 1.33-.844 1.757l-1.937 1.55A.75.75 0 018 18.25v-5.757a2.25 2.25 0 00-.659-1.591L2.659 6.22A2.25 2.25 0 012 4.629V2.34a.75.75 0 01.628-.74z" clip-rule="evenodd"/>
          </svg>

          <span class="filter-label">{{ getGroupLabel(group) }}</span>

          <!-- Clear button for this group -->
          @if ((activeFilters()[group.key]?.length ?? 0) > 0) {
            <span class="clear-group" (click)="clearGroup(group.key, $event)" title="Clear">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                <path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"/>
              </svg>
            </span>
          } @else {
            <!-- Chevron -->
            <svg class="chevron" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
              <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/>
            </svg>
          }
        </button>

        <!-- Dropdown panel -->
        @if (openDropdown() === group.key) {
          <div class="dropdown-panel" (click)="$event.stopPropagation()">
            <ul class="option-list">
              @for (option of group.options; track option.value) {
                <li>
                  <button
                    class="option-btn"
                    [class.selected]="isActive(group.key, option.value)"
                    (click)="selectOption(group, option.value)"
                  >
                    <!-- Checkbox indicator for multi-select -->
                    @if (group.multiple) {
                      <span class="checkbox" [class.checked]="isActive(group.key, option.value)">
                        @if (isActive(group.key, option.value)) {
                          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" clip-rule="evenodd"/>
                          </svg>
                        }
                      </span>
                    }

                    <span class="option-label">{{ option.label }}</span>

                    @if (option.count !== undefined) {
                      <span class="option-count">{{ option.count }}</span>
                    }
                  </button>
                </li>
              }
            </ul>
          </div>

          <!-- Backdrop -->
          <div class="dropdown-backdrop" (click)="closeDropdowns()"></div>
        }
      </div>
    }
  </div>

  <!-- Clear all -->
  @if (activeCount() > 0) {
    <button class="clear-all-btn" (click)="clearAll()">
      Clear all ({{ activeCount() }})
    </button>
  }

</div>
